[build-system]
requires = ["setuptools>=69", "setuptools-scm>=8", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "py-bragerone"
dynamic = ["version"]  # wersja zaciągana z tagów git (setuptools-scm)
description = "Brager One client: REST + WebSocket + label resolver for Home Assistant & tools"
readme = "README.md"
license = { file = "LICENSE" }
authors = [
  { name = "MarPi82", email = "marpi82@users.noreply.github.com" },
]
maintainers = [
  { name = "MarPi82", email = "marpi82@users.noreply.github.com" }
]
requires-python = ">=3.10"
dependencies = [
  "aiohttp>=3.9",
  "python-socketio[asyncio_client]>=5.11",
]

classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Operating System :: OS Independent",
  "Topic :: Home Automation",
]

[project.urls]
Homepage      = "https://github.com/marpi82/py-bragerone"
Issues        = "https://github.com/marpi82/py-bragerone/issues"
Documentation = "https://marpi82.github.io/py-bragerone/latest/"

[project.scripts]
bragerone-cli = "bragerone.__main__:main"

[project.optional-dependencies]
dev = ["pre-commit", "ruff>=0.5", "black>=24.3", "isort>=5.13", "mypy>=1.7"]
test = ["pytest>=8", "pytest-asyncio>=0.23", "pytest-cov>=5.0", "aioresponses>=0.7", "packaging>=24"]
docs = ["sphinx>=7.3", "sphinx-autodoc-typehints>=2.3", "sphinxcontrib-napoleon>=0.7", "mike>=2.1.0"]

[tool.setuptools]
package-dir = {"" = "src"}
packages = ["bragerone"]

[tool.setuptools_scm]
version_scheme = "guess-next-dev"
local_scheme = "no-local-version"
fallback_version = "0.0.0"

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-q --cov=bragerone --cov-report=term-missing"
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.isort]
profile = "black"
src_paths = ["src", "tests"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]
fix = true

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
disallow_untyped_defs = true
mypy_path = "src"
