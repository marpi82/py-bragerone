name: Release

on:
  # Możesz wywołać ręcznie (np. na branchu, żeby wrzucić paczkę na TestPyPI)
  workflow_dispatch:
  # Automatyczny release tylko na prawidłowe tagi semver
  #push:
  #  tags:
  #    - "v*.*.*"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # wymagane przez setuptools-scm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine setuptools-scm

      - name: Show scm version
        id: scm
        run: |
          V=$(python -m setuptools_scm)
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Detected version: $V"

      # (Opcjonalnie, ale zalecane) — na tagu upewnij się, że wersja z scm == tag (bez 'v')
      - name: Validate tag vs scm version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "TAG=${TAG}"
          SCM="${{ steps.scm.outputs.version }}"
          # Porównujemy tylko rdzeń wersji (bez przyrostka local +g<sha>)
          SCM_CORE=$(python - <<'PY'
import re, sys
v = sys.argv[1]
print(re.split(r'\+|\.d', v, 1)[0])  # ucina +g..., .dev...
PY
"$SCM")
          echo "SCM_CORE=${SCM_CORE}"
          if [ "$SCM_CORE" != "$TAG" ]; then
            echo "::error::Tag ($TAG) != setuptools-scm ($SCM_CORE)"
            exit 1
          fi

      - name: Build sdist & wheel
        run: python -m build

      # -------- Upload logic --------
      # Na tagu — publikacja do PyPI
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      # Bez tagu (push na branch / workflow_dispatch) — publikacja do TestPyPI
      - name: Publish to TestPyPI
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          twine upload --repository-url https://test.pypi.org/legacy/ dist/*

      # Release na GitHubie tylko dla tagów
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
